name: Release

# A release is published whenever the VERSION file changes on main (the
# release action creates the matching v<VERSION> tag). Changes to this
# workflow also trigger a run, but the already-released guard makes that a
# no-op unless the VERSION is new. workflow_dispatch allows manual re-runs.
on:
  push:
    branches: [main]
    paths:
      - 'ShiftChange/Sources/ShiftChange/Resources/VERSION'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must match the VERSION file)'
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < ShiftChange/Sources/ShiftChange/Resources/VERSION)
          REQUESTED="${{ github.event.inputs.version }}"
          if [ -n "$REQUESTED" ] && [ "$REQUESTED" != "$FILE_VERSION" ]; then
            echo "::error::Requested version $REQUESTED does not match the VERSION file ($FILE_VERSION). The About screen reads the VERSION file, so these must match."
            exit 1
          fi
          echo "VERSION=$FILE_VERSION" >> $GITHUB_OUTPUT

      - name: Check if already released
        id: check
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "v${{ steps.version.outputs.VERSION }} is already tagged — nothing to release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      # Imports the Developer ID certificate into a temporary keychain and
      # exports CODESIGN_IDENTITY / NOTARY_* for create-dmg.sh. If the
      # secrets are not configured, the release proceeds UNSIGNED with a
      # warning so distribution is never blocked on credentials.
      - name: Set up code signing & notarization
        if: steps.check.outputs.should_release == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          NOTARY_API_KEY: ${{ secrets.NOTARY_API_KEY }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "::warning::MACOS_CERTIFICATE secret not set — this release will be UNSIGNED and users will hit Gatekeeper warnings."
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          rm "$RUNNER_TEMP/certificate.p12"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the imported certificate. Export the correct certificate type from Keychain Access."
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Signing identity: $IDENTITY"

          if [ -n "$NOTARY_API_KEY" ] && [ -n "$NOTARY_KEY_ID" ] && [ -n "$NOTARY_ISSUER_ID" ]; then
            echo "$NOTARY_API_KEY" > "$RUNNER_TEMP/notary_key.p8"
            echo "NOTARY_KEY_PATH=$RUNNER_TEMP/notary_key.p8" >> "$GITHUB_ENV"
            echo "NOTARY_KEY_ID=$NOTARY_KEY_ID" >> "$GITHUB_ENV"
            echo "NOTARY_ISSUER_ID=$NOTARY_ISSUER_ID" >> "$GITHUB_ENV"
          else
            echo "::warning::Notary secrets (NOTARY_API_KEY / NOTARY_KEY_ID / NOTARY_ISSUER_ID) not fully set — DMG will be signed but NOT notarized."
          fi

      - name: Build DMG
        if: steps.check.outputs.should_release == 'true'
        run: |
          chmod +x scripts/create-dmg.sh
          scripts/create-dmg.sh "${{ steps.version.outputs.VERSION }}"

      - name: Compute SHA256
        if: steps.check.outputs.should_release == 'true'
        id: sha
        run: |
          SHA=$(shasum -a 256 "ShiftChange-${{ steps.version.outputs.VERSION }}.dmg" | awk '{print $1}')
          echo "SHA256=$SHA" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: ShiftChange ${{ steps.version.outputs.VERSION }}
          files: ShiftChange-${{ steps.version.outputs.VERSION }}.dmg
          generate_release_notes: true
          draft: false

      # Runs after the release so the cask never points at a download that
      # doesn't exist yet.
      - name: Update Homebrew formula
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA="${{ steps.sha.outputs.SHA256 }}"
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" HomebrewFormula/shiftchange.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"$SHA\"/" HomebrewFormula/shiftchange.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HomebrewFormula/shiftchange.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git commit -m "Update Homebrew cask to v$VERSION"
          # Rebase onto current main so the push is a fast-forward even if
          # main moved during the build.
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
